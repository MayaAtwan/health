<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Healthy Recipe Journal{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="page-bg"></div>

    <header class="topbar">
        <div class="brand">
            <div class="brand-logo-wrap">
                <img class="brand-logo" src="{{ url_for('static', filename='images/healthy-recipe-logo.svg') }}" alt="Healthy Recipe Journal logo">
            </div>
            <div>
                <p class="brand-overline">Healthy recipe journal</p>
                <h1 class="brand-title">Healthy Recipe Journal</h1>
            </div>
        </div>
        <p class="brand-subtitle">Real home recipes shaped by a fitness journey and more than 15 kg lost.</p>
    </header>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <script>
        function showLoading() {
            const btn = document.getElementById("ask-btn");
            if (btn) {
                btn.innerText = "Thinking...";
                btn.disabled = true;
            }
        }

        function countChars() {
            const input = document.getElementById("question");
            const counter = document.getElementById("char-counter");
            if (input && counter) {
                counter.innerText = input.value.length + " characters";
            }
        }

        window.addEventListener("load", countChars);
    </script>
</body>
</html>
